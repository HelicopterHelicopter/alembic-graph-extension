<!DOCTYPE html>
<!--
  Dev harness for the graph webview — lets you render the real, BUILT dist/webview/graph.{js,css}
  in a plain browser (Playwright, or just double-click this file) without launching VS Code.

  Usage:
    1. npm run build                 # (re)builds dist/webview/graph.{js,css}
    2. node scripts/dump-state.mjs   # (re)generates state.json + details.json from the fixture
    3. open this file directly (file://.../harness/graph.html), or serve harness/ over http(s)

  How it works: main.ts calls `acquireVsCodeApi()` once at module scope and talks to the host
  only via `postMessage`/`window.addEventListener("message")`. This page stubs
  `acquireVsCodeApi()` (postMessage -> console.log, so toolbar/click actions are inspectable) and,
  on the webview's initial `{type:"ready", restored}` postMessage, dispatches a `message` event
  carrying `{ type: "state", state: <captured AppState> }` loaded from ./state.json — the exact
  shape the extension host would post over the real webview bridge. Re-run step 2 after any change
  to core/parser|graph|layout.ts or the broken-project fixture; re-run step 1 after any change to
  src/webview/graph/*.

  Task 10 (revision detail panel): the stub also RESPONDS to `{type:"select", id}` postMessages —
  the same round trip GraphPanelManager.handleMessage()'s "select" case does for real (see
  src/ui/graphPanel.ts) — by looking `id` up in ./details.json (generated by the same
  dump-state.mjs run, mirroring MigrationService.getDetail()) and dispatching a `detail` message
  back asynchronously. An id with no entry (unknown, or a ghost/collapse placeholder) resolves to
  `detail: null`, exactly like the real host.

  Task 11 (UI prefs persistence + restore): getState()/setState() are backed by a real JS object
  (`vsState`), matching the real `vscode.getState()`/`setState()` contract main.ts relies on. To
  test RESTORE (not just persist), pre-seed `vsState` before main.ts's module-scope `getPersisted()`
  call runs — either:
    - set `window.__seedState = {...}` before this page's scripts run (e.g. Playwright's
      `page.addInitScript`, which is guaranteed to execute before ANY page script, including this
      inline one), or
    - append `?seed=<encodeURIComponent(JSON.stringify({...}))>` to the URL.
  `window.__seedState` wins if both are present. Neither present -> vsState stays undefined, i.e.
  a fresh/never-persisted webview, exactly like a real first-ever open.

  The stub also mirrors GraphPanelManager's "ready" case -> MigrationService.applyUiPrefs(): a
  non-null `restored` is shallow-merged into state.json's `ui` before the `state` message is
  dispatched, so a seeded order/density/expandCollapsed is actually observable in the rendered
  canvas (card size, stacking order, collapse), not just echoed back in the `ready` postMessage
  log line. `restored === null` dispatches state.json's `ui` unchanged, same as the real host
  standing by its own workspaceState-backed prefs.

  Task 14 (drag-to-merge): the stub does NOT run a real `alembic merge` (there's no host process
  here) — it just records every posted `{type:"merge", a, b}` into `window.__postedMerges` (a
  Playwright test asserts against that array directly, rather than scraping console text) and
  leaves it at that; no `busy`/`toast`/`state` follow-up is synthesized automatically. To exercise
  the busy-gates-drag path, a test calls `window.__sendBusy(operation, active)`, which dispatches a
  `busy` message the same shape GraphPanelManager would post for real.

  Task 15 (ghost-drag repoint): same idea — every posted `{type:"repoint", ghostId, targetId}`
  lands in `window.__postedRepoints` instead of driving a real text edit. state.json (dumped from
  the broken-project fixture) already has exactly what this needs to exercise both repoint-drag
  sources: the ghost `deadbeef0000` and its one broken child `5c0d13aa7d9f`, which is ALSO a head
  (`3aebf1885b7d`/`4bfc02996c8e` are the other two) — so dragging the ghost card is a repoint drag,
  while dragging the `5c0d13aa7d9f` card is still a merge drag (heads win — see dnd.ts).

  Task 17 (context menu + new revision): every posted upgradeTo/downgradeTo/previewSql/copyId/
  openFile/newRevision message lands, whole, in `window.__postedActions` — one shared array (the
  menu items are exercised one at a time, so per-type arrays would add nothing) that a Playwright
  test reads directly, same as __postedMerges/__postedRepoints. No host behavior (modal, QuickPick,
  clipboard write, busy round trip) is synthesized — `window.__sendBusy` remains the way to
  exercise the busy-gates-the-menu / busy-disables-"+ New revision" paths.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../dist/webview/graph.css">
<title>Alembic Graph — dev harness</title>
<script>
  // Stub of the VS Code webview bridge (see src/webview/vscode-webview.d.ts / shared/vscodeApi.ts).
  // acquireVsCodeApi() must exist before main.ts's module-scope call runs, and can only be called
  // once per real webview — this stub is fine to call more than once (unlike the real API) since
  // there's no host on the other end to complain, but main.ts still only calls it once.
  let vsState = seedInitialState();
  // Tracks the most recent "select" id — see respondToSelect()'s stale-response guard below.
  let pendingSelectId;
  // Task 14: every posted "merge" message, in order — a Playwright test reads this directly
  // instead of parsing console log lines.
  window.__postedMerges = [];
  // Task 15: same idea, for ghost-drag repoint drops.
  window.__postedRepoints = [];
  // Task 17: same idea, for context-menu items + the "+ New revision" toolbar button — one shared
  // array of whole messages (see the file header comment).
  window.__postedActions = [];
  const RECORDED_ACTION_TYPES = new Set(["upgradeTo", "downgradeTo", "previewSql", "copyId", "openFile", "newRevision"]);
  window.acquireVsCodeApi = () => ({
    postMessage: (message) => {
      console.log("[harness] postMessage from webview:", message);
      if (message && message.type === "ready") {
        respondToReady(message.restored);
      } else if (message && message.type === "select") {
        pendingSelectId = message.id;
        respondToSelect(message.id);
      } else if (message && message.type === "setOrientation") {
        respondToUiPatch({ order: message.order });
      } else if (message && message.type === "setDensity") {
        respondToUiPatch({ density: message.density });
      } else if (message && message.type === "expandCollapse") {
        respondToUiPatch({ expandCollapsed: !currentState?.ui.expandCollapsed });
      } else if (message && message.type === "merge") {
        window.__postedMerges.push({ a: message.a, b: message.b });
      } else if (message && message.type === "repoint") {
        window.__postedRepoints.push({ ghostId: message.ghostId, targetId: message.targetId });
      } else if (message && RECORDED_ACTION_TYPES.has(message.type)) {
        window.__postedActions.push(message);
      }
    },
    getState: () => vsState,
    setState: (state) => {
      console.log("[harness] setState:", state);
      vsState = state;
    },
  });

  // Task 14: lets a Playwright test simulate the host's busy on/off round trip (main.ts's
  // "busy" case) without a real mergeHeadsAction in flight.
  window.__sendBusy = (operation, active) => {
    window.postMessage({ type: "busy", operation, active }, "*");
  };

  // Task 11: reads a pre-seeded persisted state so `getPersisted()`/restore can be exercised in a
  // browser without a real VS Code host. See the file header comment above for the two ways to
  // seed it. Returns undefined (not null) when unseeded, matching `vscode.getState()`'s contract
  // for a webview that has never called `setState`.
  function seedInitialState() {
    if (window.__seedState !== undefined) return window.__seedState;
    const params = new URLSearchParams(window.location.search);
    const seedParam = params.get("seed");
    if (seedParam) {
      try {
        return JSON.parse(seedParam);
      } catch (err) {
        console.error("[harness] invalid ?seed= JSON, ignoring:", err);
      }
    }
    return undefined;
  }

  // The single "current" AppState this stub host hands out — set by respondToReady(), then
  // mutated in place (new object, same shape) by respondToUiPatch() so toolbar toggles/collapse
  // clicks are round-trippable in the harness, same as a real host echoing back a new "state".
  let currentState = null;

  // Delivers the captured AppState the same way GraphPanelManager's real "ready" case does:
  // MigrationService.applyUiPrefs(restored) (Task 11) merges a non-null `restored` into the
  // current ui and posts state; a null `restored` just posts state as-is. Fetch (not a bare
  // <script src> global) so this also works when the page is opened as a plain file:// URL in
  // browsers that allow file-relative fetch (Chromium).
  function respondToReady(restored) {
    fetch("./state.json")
      .then((r) => r.json())
      .then((state) => {
        currentState = restored ? { ...state, ui: { ...state.ui, ...restored } } : state;
        window.postMessage({ type: "state", state: currentState }, "*");
      })
      .catch((err) => {
        console.error("[harness] failed to load state.json — run `node scripts/dump-state.mjs` first", err);
      });
  }

  // Mirrors MigrationService.setOrder/setDensity/setExpandCollapsed: a client-side ui patch,
  // applied synchronously (no re-layout — same simplification the real setOrder/setDensity make;
  // this stub doesn't attempt to replicate expandCollapse's cache re-layout), re-emitted as a
  // fresh "state" message. No-op before the first "ready" round trip has populated currentState.
  function respondToUiPatch(patch) {
    if (!currentState) return;
    currentState = { ...currentState, ui: { ...currentState.ui, ...patch } };
    window.postMessage({ type: "state", state: currentState }, "*");
  }

  // Mirrors GraphPanelManager's "select" case -> MigrationService.getDetail(): looks `id` up in
  // details.json and posts a "detail" message back, tagged with `forId` (the id this response
  // answers — the protocol's own race guard, see src/webview/graph/main.ts) so the webview can
  // discard it if a later select has since superseded it. Fetches fresh every time (simplicity
  // over caching — this is a dev-only stub) so the fetch's Promise chain is what makes the
  // response land asynchronously, same as a real cross-process postMessage round trip would.
  // Unlike the real host (whose webview message channel is FIFO and whose "select" handler has
  // no async gap, so responses always land in request order), these are independent concurrent
  // fetches — if the user clicks node A then B before A's fetch resolves, A's response can land
  // after B's. This harness-side check (only post if `id` still matches the LATEST select) is
  // redundant with the webview's own `forId` guard, but keeps this stub from spamming stale
  // "detail" messages it already knows are superseded.
  function respondToSelect(id) {
    fetch("./details.json")
      .then((r) => r.json())
      .then((details) => {
        if (id !== pendingSelectId) return; // superseded by a later select — stale, drop it
        const detail = id !== null && Object.prototype.hasOwnProperty.call(details, id) ? details[id] : null;
        window.postMessage({ type: "detail", forId: id, detail }, "*");
      })
      .catch((err) => {
        console.error("[harness] failed to load details.json — run `node scripts/dump-state.mjs` first", err);
      });
  }
</script>
</head>
<body>
<div id="app"></div>
<script nonce="harness" src="../dist/webview/graph.js"></script>
</body>
</html>
