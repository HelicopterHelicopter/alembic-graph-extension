<!DOCTYPE html>
<!--
  Dev harness for the sidebar webview — lets you render the real, BUILT
  dist/webview/sidebar.{js,css} in a plain browser (Playwright, or just double-click this file)
  without launching VS Code. Mirrors harness/graph.html's stub pattern (see that file's header
  comment for the general approach) but simpler: the sidebar has no "select" -> "detail" round
  trip to simulate (clicking a head row just posts "select"; the real host's SidebarViewProvider
  hands that off to GraphPanelManager — nothing the sidebar webview itself waits on), and no
  persisted UI state (getState()/setState() are stubbed for API-shape completeness only).

  Usage:
    1. npm run build                 # (re)builds dist/webview/sidebar.{js,css}
    2. node scripts/dump-state.mjs   # (re)generates state.json from the fixture
    3. open this file directly (file://.../harness/sidebar.html), or serve harness/ over http(s)

  Query params:
    ?nostate=1  — the stub responds to "ready" with a "noProject" message, simulating the
                  no-project host (see src/ui/sidebarView.ts: `this.service === null` posts
                  "noProject" instead of ever posting "state"). Exercises render.ts's
                  renderNoProject() replacing the initial renderScanning() placeholder.
    ?delay=N    — the stub waits N ms after "ready" before posting "state" (default: none),
                  simulating a real scan still in flight. Exercises renderScanning()'s neutral
                  "Scanning migrations…" placeholder staying up during that window, then being
                  replaced by a real render() the moment "state" lands. Example: ?delay=500
-->

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../dist/webview/sidebar.css">
<title>Alembic Migrations — dev harness</title>
<script>
  // Stub of the VS Code webview bridge (see src/webview/vscode-webview.d.ts / shared/vscodeApi.ts).
  let vsState;
  window.acquireVsCodeApi = () => ({
    postMessage: (message) => {
      console.log("[harness] postMessage from webview:", message);
      if (message && message.type === "ready") respondToReady();
    },
    getState: () => vsState,
    setState: (state) => {
      console.log("[harness] setState:", state);
      vsState = state;
    },
  });

  function nostate() {
    return new URLSearchParams(window.location.search).get("nostate") === "1";
  }

  function delayMs() {
    const raw = new URLSearchParams(window.location.search).get("delay");
    const n = raw ? Number.parseInt(raw, 10) : 0;
    return Number.isFinite(n) && n > 0 ? n : 0;
  }

  // Mirrors SidebarViewProvider's real "ready" handler (see src/ui/sidebarView.ts): with
  // ?nostate=1, posts "noProject" once, simulating the no-project host (`this.service === null`).
  // Otherwise loads the captured AppState and posts "state" — after an optional ?delay=N ms pause
  // that simulates a real scan still in flight, so the webview's neutral "Scanning migrations…"
  // placeholder (renderScanning()) is visible in the interim before being replaced by render().
  function respondToReady() {
    if (nostate()) {
      console.log("[harness] ?nostate=1 — posting noProject (simulates the no-project host)");
      window.postMessage({ type: "noProject" }, "*");
      return;
    }
    const delay = delayMs();
    const sendState = () => {
      fetch("./state.json")
        .then((r) => r.json())
        .then((state) => {
          window.postMessage({ type: "state", state }, "*");
        })
        .catch((err) => {
          console.error("[harness] failed to load state.json — run `node scripts/dump-state.mjs` first", err);
        });
    };
    if (delay > 0) {
      console.log(`[harness] ?delay=${delay} — waiting before posting state (Scanning migrations… should be visible now)`);
      setTimeout(sendState, delay);
    } else {
      sendState();
    }
  }
</script>
</head>
<body>
<div id="app"></div>
<script nonce="harness" src="../dist/webview/sidebar.js"></script>
</body>
</html>
